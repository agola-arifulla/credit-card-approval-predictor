<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Credit Card Approval Prediction</title>

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="container">
      <div class="card">
        <h1>Credit Card Approval Prediction</h1>

        <p class="subtitle">
          Enter the applicant details to predict whether the credit card
          application will be approved.
        </p>

        <form action="/predict" method="POST">
          <!-- Personal Information -->

          <h2>Personal Information</h2>

          <div class="grid">
            <div class="input-group">
              <label>Gender</label>
              <select name="Gender">
                <option value="1">Male</option>
                <option value="0">Female</option>
              </select>
            </div>

            <div class="input-group">
              <label>Age</label>
              <input type="number" step="0.1" name="Age" required />
            </div>

            <div class="input-group">
              <label>Ethnicity</label>
              <select name="Ethnicity">
                <option>Asian</option>
                <option>Black</option>
                <option>Latino</option>
                <option>Other</option>
                <option>White</option>
              </select>
            </div>

            <div class="input-group">
              <label>Citizen</label>
              <select name="Citizen">
                <option>ByBirth</option>
                <option>ByOtherMeans</option>
                <option>Temporary</option>
              </select>
            </div>
          </div>

          <!-- Financial Information -->

          <h2>Financial Information</h2>

          <div class="grid">
            <div class="input-group">
              <label>Income</label>
              <input type="number" name="Income" required />
            </div>

            <div class="input-group">
              <label>Debt</label>
              <input type="number" step="0.01" name="Debt" required />
            </div>

            <div class="input-group">
              <label>Credit Score</label>
              <input type="number" name="CreditScore" required />
            </div>

            <div class="input-group">
              <label>Years Employed</label>
              <input type="number" step="0.1" name="YearsEmployed" required />
            </div>

            <div class="input-group">
              <label>Industry</label>
              <select name="Industry">
                <option>CommunicationServices</option>
                <option>ConsumerDiscretionary</option>
                <option>ConsumerStaples</option>
                <option>Education</option>
                <option>Energy</option>
                <option>Financials</option>
                <option>Healthcare</option>
                <option>Industrials</option>
                <option>InformationTechnology</option>
                <option>Materials</option>
                <option>Real Estate</option>
                <option>Research</option>
                <option>Transport</option>
                <option>Utilities</option>
              </select>
            </div>
          </div>

          <!-- Banking Information -->

          <h2>Banking Information</h2>

          <div class="grid">
            <div class="input-group">
              <label>Married</label>
              <select name="Married">
                <option value="1">Yes</option>
                <option value="0">No</option>
              </select>
            </div>

            <div class="input-group">
              <label>Bank Customer</label>
              <select name="BankCustomer">
                <option value="1">Yes</option>
                <option value="0">No</option>
              </select>
            </div>

            <div class="input-group">
              <label>Prior Default</label>
              <select name="PriorDefault">
                <option value="1">Yes</option>
                <option value="0">No</option>
              </select>
            </div>

            <div class="input-group">
              <label>Currently Employed</label>
              <select name="Employed">
                <option value="1">Yes</option>
                <option value="0">No</option>
              </select>
            </div>

            <div class="input-group">
              <label>Driver's License</label>
              <select name="DriversLicense">
                <option value="1">Yes</option>
                <option value="0">No</option>
              </select>
            </div>

            <div class="input-group">
              <label>Zip Code</label>
              <input type="number" name="ZipCode" required />
            </div>
          </div>

          <button type="submit">Predict Approval</button>
        </form>
      </div>
    </div>
  </body>
</html>
